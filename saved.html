<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saved Recipes - Recipe Finder</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav>
            <div class="nav-brand">
                <span class="brand-icon">🍳</span>
                <span class="brand-name">RecipeFinder</span>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="saved.html" class="active">Saved Recipes</a></li>
                <li><a href="about.html">About</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="saved-hero">
            <h1>Your Saved Recipes</h1>
            <p id="saved-count">You have 0 saved recipes</p>
            <button id="clear-all-btn" class="btn btn-danger">Clear All</button>
        </section>

        <section id="saved-section">
            <div id="saved-grid" class="recipe-grid"></div>
            <div id="empty-saved" class="empty-state">
                <p>No saved recipes yet.</p>
                <p><a href="index.html">Search for recipes</a> and save your favorites!</p>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 RecipeFinder. All recipes provided by TheMealDB API.</p>
    </footer>

    <script type="module" src="js/main.js"></script>
</body>
</html>
